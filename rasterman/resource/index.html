<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Processing</title>
    <link rel="stylesheet" href="xp.css">
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ECE9D8;
        }

        .window {
            width: 100vw;
            height: 100vh;
            box-sizing: border-box;
        }

        .images-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 0px;
        }

        .image-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: auto;
            background-color: #fff;
            padding: 6px;
            flex: 1;
            aspect-ratio: 1 / 1;
        }

        .square-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 4px;
        }
        
        .square-image:not([src]) {
            opacity: 0;
        }

        fieldset {
            border: 2px solid #000;
            padding: 15px;
        }

        legend {
            font-size: 14px;
            font-weight: bold;
        }

        .control-panel-layout {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 15px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .control-group {
            width: auto;
        }

        .save-button-container {
            display: flex;
        }
        
        .save-button-container button {
            height: 100%;
            width: 80px;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
        }

        input[type="range"] {
            width: 100%;
        }

        select, input[type="number"] {
            width: 100%;
            padding: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <!-- Window container -->
    <div class="window">
        <!-- Title Bar -->
        <div class="title-bar pywebview-drag-region">
            <span class="title-bar-text">Rasterman</span>
            <div class="title-bar-controls">
                <button aria-label="Minimize" id="btn-minimize"></button>
                <button aria-label="Maximize" id="btn-maximize"></button>
                <button aria-label="Close" id="btn-close"></button>
            </div>
        </div>

        <!-- Window Body -->
        <div class="window-body">
    <!-- Two square images side by side -->
    <div class="images-container">
        <fieldset class="image-wrapper" style="margin: 0;">
            <legend>Original Image</legend>
            <img alt="Original Image" class="square-image">
        </fieldset>
        <fieldset class="image-wrapper" style="margin: 0; position: relative;">
            <legend>Processed Result</legend>
            <img alt="Result Image" class="square-image">
            <div id="loading-overlay" style="display: none; position: absolute; inset: 0; background: rgba(236, 233, 216, 0.7); justify-content: center; align-items: center; border-radius: 4px;">
                <span>Loading...</span>
            </div>
        </fieldset>
    </div>

    <!-- Control Panel -->
    <fieldset style="margin-top: 5px;">
        <legend>Controls</legend>
        
        <div class="control-panel-layout">
            <div class="options-grid">
                <!-- Select Image -->
                <div class="control-group field-row-stacked">
                    <label>Source Image</label>
                    <button id="select-image-btn" style="width: 100%; height: 26px;">Browse...</button>
                </div>

            <!-- Threshold Limit Slider -->
            <div class="control-group field-row-stacked">
                <label for="threshold-limit">Threshold: <span id="threshold-value">128</span></label>
                <input type="range" id="threshold-limit" min="0" max="255" value="128">
            </div>

            <!-- Threshold Menu Dropdown -->
            <div class="control-group field-row-stacked">
                <label for="threshold-type">Threshold Type</label>
                <select id="threshold-type">
                    <option value="cv2.THRESH_BINARY">cv2.THRESH_BINARY</option>
                    <option value="cv2.THRESH_BINARY_INV">cv2.THRESH_BINARY_INV</option>
                    <option value="cv2.THRESH_TRUNC">cv2.THRESH_TRUNC</option>
                    <option value="cv2.THRESH_TOZERO">cv2.THRESH_TOZERO</option>
                    <option value="cv2.THRESH_TOZERO_INV">cv2.THRESH_TOZERO_INV</option>
                </select>
            </div>

            <!-- Downsampling Method Dropdown -->
            <div class="control-group field-row-stacked">
                <label for="downsample-method">Downsample Method</label>
                <select id="downsample-method" style="width: 100%;">
                    <option value="cv2.INTER_AREA">INTER_AREA</option>
                    <option value="cv2.INTER_LINEAR">INTER_LINEAR</option>
                    <option value="cv2.INTER_CUBIC">INTER_CUBIC</option>
                    <option value="cv2.INTER_NEAREST">INTER_NEAREST</option>
                    <option value="cv2.INTER_LANCZOS4">INTER_LANCZOS4</option>
                </select>
            </div>

            <!-- Remove Background Dropdown -->
            <div class="control-group field-row-stacked">
                <label for="remove-background">Remove Background</label>
                <select id="remove-background" style="width: 100%;">
                    <option value="false">No</option>
                    <option value="true">Yes</option>
                </select>
            </div>

            <!-- REMBG Model Dropdown -->
            <div class="control-group field-row-stacked">
                <label for="rembg-model">Rembg Model</label>
                <select id="rembg-model" style="width: 100%;">
                    <option value="u2net">u2net</option>
                    <option value="u2netp">u2netp</option>
                    <option value="u2net_human_seg">u2net_human_seg</option>
                    <option value="u2net_cloth_seg">u2net_cloth_seg</option>
                    <option value="silueta">silueta</option>
                    <option value="isnet-general-use">isnet-general-use</option>
                    <option value="isnet-anime">isnet-anime</option>
                    <option value="sam">sam</option>
                    <option value="birefnet-general">birefnet-general</option>
                    <option value="birefnet-general-lite">birefnet-general-lite</option>
                    <option value="birefnet-portrait">birefnet-portrait</option>
                    <option value="birefnet-dis">birefnet-dis</option>
                    <option value="birefnet-hrsod">birefnet-hrsod</option>
                    <option value="birefnet-cod">birefnet-cod</option>
                    <option value="birefnet-massive">birefnet-massive</option>
                    <option value="bria-rmbg">bria-rmbg</option>
                </select>
            </div>

            <!-- Result Size Number Select -->
            <div class="control-group field-row-stacked">
                <label for="result-size">Result Size</label>
                <input type="number" id="result-size" value="512" min="64" max="4096" step="64">
            </div>
            </div> <!-- End options-grid -->

            <!-- Save Button -->
            <div class="save-button-container">
                <button id="save-btn">Save</button>
            </div>
        </div>
    </fieldset>

    <script>
        const thresholdSlider = document.getElementById('threshold-limit');
        const thresholdValue = document.getElementById('threshold-value');
        const thresholdType = document.getElementById('threshold-type');
        const removeBg = document.getElementById('remove-background');
        const rembgModel = document.getElementById('rembg-model');
        const downsampleMethod = document.getElementById('downsample-method');
        const resultSize = document.getElementById('result-size');
        const originalImage = document.querySelector('.images-container fieldset:first-child img');
        const resultImage = document.querySelector('.images-container fieldset:last-child img');
        const loadingOverlay = document.getElementById('loading-overlay');
        
        const updateImage = () => {
            if (window.pywebview && window.pywebview.api) {
                if (removeBg.value === 'true') {
                    loadingOverlay.style.display = 'flex';
                }
                window.pywebview.api.process_image(
                    thresholdSlider.value,
                    thresholdType.value,
                    removeBg.value,
                    rembgModel.value,
                    downsampleMethod.value,
                    resultSize.value
                ).then(data => {
                    loadingOverlay.style.display = 'none';
                    if (data && data.startsWith('data:')) {
                        resultImage.src = data;
                    } else if (!data) {
                        resultImage.removeAttribute('src');
                    }
                }).catch(() => {
                    loadingOverlay.style.display = 'none';
                });
            }
        };

        if (thresholdSlider && thresholdValue) {
            thresholdSlider.addEventListener('input', function() {
                thresholdValue.textContent = this.value;
                updateImage(); // Update on drag
            });
        }

        // Trigger updates when other controls change
        [thresholdType, removeBg, rembgModel, downsampleMethod, resultSize].forEach(ctrl => {
            if (ctrl) ctrl.addEventListener('change', updateImage);
        });

        window.addEventListener('pywebviewready', function() {
            // Wait for user to select an image
        });

        // Window Controls
        document.getElementById('btn-minimize').addEventListener('click', () => {
            if (window.pywebview && window.pywebview.api) {
                window.pywebview.api.minimize();
            }
        });

        document.getElementById('btn-maximize').addEventListener('click', () => {
            if (window.pywebview && window.pywebview.api) {
                window.pywebview.api.maximize();
            }
        });

        document.getElementById('btn-close').addEventListener('click', () => {
            if (window.pywebview && window.pywebview.api) {
                window.pywebview.api.close();
            }
        });

        document.getElementById('select-image-btn').addEventListener('click', () => {
            if (window.pywebview && window.pywebview.api) {
                window.pywebview.api.select_image().then(dataUrl => {
                    if (dataUrl) {
                        originalImage.src = dataUrl;
                        updateImage();
                    }
                });
            }
        });

        document.getElementById('save-btn').addEventListener('click', () => {
            if (window.pywebview && window.pywebview.api) {
                window.pywebview.api.save_image();
            }
        });
    </script>
        </div>
    </div>
</body>
</html>
